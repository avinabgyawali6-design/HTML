<!DOCTYPE html>
<html>

<head>
    <title>My Digital Zoo Manager homework</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: aliceblue;
            text-align: center;
            color: #222222;
        }

        h1 {
            color: darkgreen;
        }

        #zoo {
            width: 420px;
            border: 3px solid darkgreen;
            border-radius: 12px;
            background-color: white;
            margin: 20px auto;
            padding: 15px;
        }

        .zone {
            border: 2px solid seagreen;
            border-radius: 8px;
            margin: 10px;
            padding: 12px;
            background-color: #f0fff0;
            text-align: left;
        }

        .animal {
            font-weight: bold;
            color: darkorange;
        }

        button {
            background-color: darkgreen;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 22px;
            cursor: pointer;
            font-weight: bold;
        }

        #output {
            width: 420px;
            border: 2px dashed darkgreen;
            border-radius: 10px;
            background-color: #ffffff;
            margin: 20px auto;
            padding: 12px;
            text-align: left;
        }
    </style>
</head>

<body>

    <h1>My Digital Zoo Manager</h1>

    <p>
        Use JavaScript and the DOM to explore animals, zones
    </p>

    <div id="zoo">

        <div class="zone" id="lionZone">
            <h2>Lion Zone</h2>
            <p>Animal: <span class="animal"></span></p>
        </div>

        <div class="zone" id="elephantZone">
            <h2>Elephant Zone</h2>
            <p>Animal: <span class="animal"></span></p>
        </div>

        <div class="zone" id="pandaZone">
            <h2>Panda Zone</h2>
            <p>Animal: <span class="animal"></span></p>
        </div>

    </div>

    <button onclick="manageZoo()">Manage Zoo</button>

   

    <script>
        function manageZoo() {

            let zoo = document.getElementById("zoo");
            let lionZone = document.getElementById("lionZone");
            let elephantZone = document.getElementById("elephantZone");
            let pandaZone = document.getElementById("pandaZone");
            let output = document.getElementById("output");

          
           
           
            lionZone.style.backgroundColor = "#fff3cd";
            elephantZone.style.backgroundColor = "#d1ecf1";
            pandaZone.style.backgroundColor = "#f8d7da";

            lionZone.querySelector("h2").innerHTML = "Updated Lion Zone";
            elephantZone.querySelector("h2").innerHTML = "Updated Elephant Zone";
            pandaZone.querySelector("h2").innerHTML = "Updated Panda Zone";

            lionZone.querySelector("span").innerHTML = "Lion";

            elephantZone.querySelector("span").innerHTML = " Elephant ";
            pandaZone.querySelector("span").innerHTML = " Panda ";

            
        }
    </script>

</body>

</html>
