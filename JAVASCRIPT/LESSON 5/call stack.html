<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript</h2>
        <p>Do a calculation and check the result </p>
        <p id="demo"></p>
        <script>
            function add(a,b)
            {
                return a + b;
            }
            function average (a,b)
            {
              return add(a,b) /2;
            }
            let result = average(36,20)
            document.getElementById("demo").innerHTML = result;
        </script>
    </body>
</html>
