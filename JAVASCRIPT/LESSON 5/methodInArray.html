<!DOCTYPE html>
<html>
    <body>
        <h1>
            JavaScript Array Methods
        </h1>
        <h2>Join() and pop()</h2>
        <p>The join() method join the array elements in string and pop() method remove the last element
            from an array
        </p>
        <p id="myjoin"></p>
        <p id="print_array"></p>
        <p id="mypop"></p>
        <script>
            var fruits = [
                "Mango",
                "Banana",
                "apple",
                "watermelon"
            ];
            document.getElementById("myjoin").innerHTML =fruits.join("  &");
            document.getElementById("print_array").innerHTML = fruits;fruits.pop();
            document.getElementById("mypop").innerHTML = fruits;
        </script>
    </body>
</html>
