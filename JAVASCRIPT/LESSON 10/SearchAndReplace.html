<html>
    <head>
        <title>Search and replace</title>
    </head>
    <body>
        <h1>javascript string method</h1>
        <p>the string method can convert number into string</p>
        <p id="number result"></p>
        <p id="string result"></p>
        <script>
            var x = 60;
            var y = 70;
            document.getElementById("number result").innerHTML = x + y;
            document.getElementById("string result").innerHTML = String(x) + String(y); 

        </script>
    </body>
</html>
