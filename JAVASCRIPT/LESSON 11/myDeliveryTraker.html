<!DOCTYPE html>
<html>
    <head>
        <title>My delivery tracker</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background-color: greenyellow;
                padding: 49px;
                text-align: center;


            }
            button {
                background-color: aqua;
                border: none;
                border-radius: 10px;
                margin-top: 1px;
                color: rgb(255, 0, 170);
                cursor: pointer; 
            }
            div {
                 border: 2px solid; 
                 border-radius: 6px;
                 margin: 7px;
                 background-color: red;
                 text-align: left;
                 padding: 7px;
            }
            h1 {
                color: black;
                
            }
        </style>
    </head>
    <body>
        <h1>My Delivery Tracker</h1>
        <button onclick="saveorder()">save order </button>
        <button onclick="startdelivery()">start delivery</button>
        <div>json text:<span id="json-text"></span></div>

        <div>loaded-item:<span id="loaded-item"></span></div>

        <div>loaded-price:<span id="loaded-price"></span></div>

        <div>status:<span id="status"></span></div>

        <div>result:<span id="result"></span></div>


        <script>
            let order=
            {
                item : "burger",
                price : 5,
                shop : "my snack shop"
            };

            function saveorder(){
                let jsontext = JSON.stringify(order);
                document.getElementById("json-text").textContent = jsontext

                let loadOrder=JSON.parse(jsontext)
                document.getElementById("loaded-item").innerHTML=loadOrder.item

                document.getElementById("loaded-price").innerHTML ="$" + loadOrder.price
            }

            function delay(ms)
            {
                return new Promise(function(resolve)
                {
                    setTimeout(resolve,ms);
                }
            );
            }
             async function startdelivery()
             {
                document.getElementById("result").innerHTML="";
               
                document.getElementById("status").innerHTML="order received";

                 setTimeout(function()
                {
                    document.getElementById("status").innerHTML="kitchen is preparing";
                },3000
                )

                await delay(3000);
                document.getElementById("status").innerHTML = "out for delivery";

                 await delay(2000);
                 document.getElementById("result").innerHTML = "order has arrived";
             }
        </script>

    </body>
</html>
