<html>
    <head>
        <title>JavaScript array</title>
    </head>
    <body>
        <h1>JavaScript array sort</h1>
        <p>Click button array to sort numbers in ascending order.</p>
        <button onclick="ascending()">Ascending</button>
        <button onclick="Decending( )">Decending</button>
        <p id="result"></p>
        <script>
            var points = [1,2,4,7,7,100,77,777];
            document.getElementById("result").innerHTML= points;


            function ascending() 
            {
                 points.sort(function(a, b)
                 {
                  return a-b ;
                 }
                );
                document.getElementById("result").innerHTML = points;
            }


            function Decending() 
            {
                 points.sort(function(a, b)
                 {
                  return b-a ;
                 }
                );
                document.getElementById("result").innerHTML = points;
            }
            
        </script>
    </body>
</html>
