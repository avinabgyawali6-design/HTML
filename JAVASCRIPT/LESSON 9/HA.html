<!DOCTYPE html>
<html>
    <head>
        <title>homework</title>
    </head>
    <body>
        <p>Ascending and Decending for mapped numbers</p>
        <p id="product_value"></p>
        <button onclick="ascending()" style="background-color: aqua;">Ascending order</button>
        <button onclick="descending()" style="background-color: aqua;">Descending order</button>
        <script>
            var numbers = [25, 12, 19, 94];
            function myfunction(num) {
                    return num * 50;
                }
                var newarray = numbers.map(myfunction);
                document.getElementById("product_value").innerHTML = "The Mapped values are: " + newarray;
                function ascending() {
                        newarray.sort(function (a, b) { return a - b });
                        document.getElementById("product_value").innerHTML =
                            "The ascending order of mapped numbers are: " + newarray;
                    }

                    function descending() {
                        newarray.sort(function (a, b) { return b - a });
                        document.getElementById("product_value").innerHTML =
                            "The descending order of mapped numbers are: " + newarray;
                    }
        </script>
    </body>
</html>
