<!DOCTYPE html>
<html>
<head>
    <title>
         JS variable
    </title>
</head>
<body>
    <h1>Javascript variables</h1>
    <p>Sum of two numbers</p>
    <p id="result"></p>
    <script>
        var num1 = 5;
        var num2 = 4;
        var sum = num1 + num2;
        document.getElementById("result").innerHTML = "the total sum is: " + sum;
    </script>
</body>
</html>
