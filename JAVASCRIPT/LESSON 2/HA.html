<!DOCTYPE html>

<head>
</head>

<body>
    <button onclick="multiply(4)">Click Me!</button>
    <p id="result"></p>
    <script>
        var a = 5
        var b =7
        function multiply(a, b) {
            if (b == undefined) {
               
                alert("The value of b is undefined");
                 b = 7
            }
            var result = a * b;
            document.getElementById("result").innerHTML = result;
        }
        
    </script>
</body>
