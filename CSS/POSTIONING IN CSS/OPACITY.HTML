        <style>
            div{
                background-color: blue ;padding: 10px;
                color: rgb(255, 17, 0);

            div.first{
                opacity: 0.1;
            }
            div.second{
                opacity: 0.3;
            }
            div.third{
            opacity: 0.6;
            }

        <div class="third"><p>Opacity 6%</p></div>
        <div><p>Opacity 100%</p></div>
    </body>
</html>
