<html>
    <head>
        <title>Shadow</title>
        <style>
            *{text-align: center;
                font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande',;

            }
            #hi{
             text-shadow: 2px 2px 1px  blue;  
            }
            #box{
                box-shadow:9px 9px 5px red ;
            }
        </style>
    </head>
    <body>
        <h1 id="hi">we can use the text shadow to give shadow to itself</h1>
        <h1 id="box">use box shadow to give shadow to element</h1>
    </body>
</html>
