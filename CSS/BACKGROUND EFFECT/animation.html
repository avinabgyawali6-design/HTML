<html>
    <head>
        <title>animation</title>
        <style>
            div{
                font-size: 55;
                text-align: center;
                height: 400;
                width: 400;
                background-color: crimson;
                animation-name: example ;
                animation-duration: 7s;
            }
            @keyframes example{
                0%{
                    background-color: crimson;
                }
                25%{
                    background-color: aqua;
                }
                30%{
                    background-color: blue;

                }
                24%{
                    background-color: brown;
                }
            }
        </style>
    </head>
    <body>
        <div>  WELCOME  TO CODINDAL  </div>
    </body>
</html>
